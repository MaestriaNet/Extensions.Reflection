#
# Publish on NuGet when tag generated.
#

name: publish-release

on:
  push:
    tags:
      - 'v*.*.*' # Triggers only when a tag matching the pattern (e.g., v1.0.0) is pushed

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # IMPORTANT: fetch-depth 0 downloads the entire history and tags.
          # The default (1) does not download tags, causing the next step to fail.
          fetch-depth: 0

      - name: Show git information
        run: |
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Commit hash: $(git rev-parse HEAD)"
          echo "Last tag: $(git describe --tags --abbrev=0)"
#          --match "v*"

      - name: Check if tag is on the latest main commit
        # Informational step to validate if the tag points to the absolute HEAD of the main branch
        run: |
          # Gets the commit SHA that triggered this tag creation
          TAG_COMMIT=${GITHUB_SHA}
          
          # Queries the remote repository for the latest commit SHA on the main branch
          MAIN_COMMIT=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          
          echo "Commit triggered by tag: $TAG_COMMIT"
          echo "Latest commit on main:   $MAIN_COMMIT"
          
          if [ "$TAG_COMMIT" = "$MAIN_COMMIT" ]; then
            echo "✅ Validation passed: The tag is correctly pointing to the latest commit on the main branch."
          else
            echo "::warning:: ⚠️ WARNING: The tag was NOT created on the latest commit of the main branch. It might be pointing to an older commit or a different branch."
          fi

      - name: "Determine version: stable"
        id: version
        run: |
          # GITHUB_REF_NAME contains the tag name (e.g., v1.2.0)
          # We remove the leading 'v' to get the clean semantic version (1.2.0)
          CLEAN_TAG=${GITHUB_REF_NAME#v}
          
          echo "Extracted version: $CLEAN_TAG"
          echo "PACKAGE_VERSION=$CLEAN_TAG" >> $GITHUB_ENV

#      - name: Abort if version indeterminate
#        if: steps.version.outputs.version_determined == ''
#        uses: actions/github-script@v8
#        with:
#          script: core.setFailed("Version could not be determined to branch workflow.");

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Display .NET Version
        run: dotnet --version

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/Extensions.Reflection.csproj --configuration Release --no-build -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload nupkg artifact to github
        uses: actions/upload-artifact@v4
        with:
          name: Maestria.Extensions.Reflection.${{ env.PACKAGE_VERSION }}-nuget-package
          path: src/bin/Release/*.nupkg

      - name: Publish stable version to MyGet
        run: dotnet nuget push src/bin/Release/*.nupkg --source https://www.myget.org/F/maestrianet/api/v3/index.json --api-key "${{ secrets.MYGET_API_KEY }}"
        
      - name: Publish stable version to NuGet
        run: dotnet nuget push src/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "src/bin/Release/*.nupkg"
          tag: "${{ steps.version.outputs.version_prefix }}"
          generateReleaseNotes: true
