#
# Publish on MyGet when merged in main
#

name: publish-preview

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - src/**
      - tests/**

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # IMPORTANTE: fetch-depth 0 baixa todo o histórico e as tags. 
          # O padrão (1) não baixa as tags, fazendo o passo seguinte falhar.
          fetch-depth: 0

      - name: Show branch and commit
        run: |
          git rev-parse --abbrev-ref HEAD
          git rev-parse HEAD
          git describe --tags --abbrev=0
#          --match "v*"

#      - name: "Determine version: preview"
#        id: version
#        run: |
#          # Obtém o prefixo da versão a partir do nome do branch de release
#          VERSION_PREFIX="${GITHUB_REF_NAME##*/}"          
#          VERSION_SUFFIX="preview.${GITHUB_RUN_NUMBER}"
#
#          echo "VERSION_PREFIX: $VERSION_PREFIX"
#          echo "VERSION_SUFFIX: $VERSION_SUFFIX"
#
#          echo "version_determined=true" >> $GITHUB_OUTPUT
#          echo "VERSION_PREFIX=$VERSION_PREFIX" >> $GITHUB_ENV
#          echo "VERSION_SUFFIX=$VERSION_SUFFIX" >> $GITHUB_ENV
      
      - name: "Determine version: preview"
        id: version
        run: |
          # Gets the latest tag pointing to the current or previous commit, matching only tags starting with 'v'
          # --match "v*"
          LAST_TAG=$(git describe --tags --abbrev=0)
          
          # Removes the leading 'v' from the tag (e.g., v1.2.0 becomes 1.2.0)
          CLEAN_TAG=${LAST_TAG#v}
          
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # Assembles the final preview version (e.g., 1.2.0-preview.pr-42)
          PREVIEW_VERSION="${CLEAN_TAG}-preview.pr-${PR_NUMBER}"
          
          echo "::notice:: Version: $PREVIEW_VERSION"
          
          # Saves the version to the environment file for subsequent steps to use
          echo "PACKAGE_VERSION=$PREVIEW_VERSION" >> $GITHUB_ENV

#      - name: Abort if version indeterminate
#        if: steps.version.outputs.version_determined == ''
#        uses: actions/github-script@v8
#        with:
#          script: core.setFailed("Version could not be determined to branch workflow.");

#      - name: Determine if the version is the same as the one in the "Version.props" file # Security validation
#        run: |
#          VERSION_FILE_PREFIX=$(grep -oPm1 "(?<=<VersionPrefix>)[^<]+" src/Version.props)
#          echo "VERSION_FILE_PREFIX: $VERSION_FILE_PREFIX"
#          
#          if [ "$VERSION_FILE_PREFIX" != "$VERSION_PREFIX" ]; then
#            echo "::error::Version prefix in 'Version.props' file ($VERSION_FILE_PREFIX) does not match witch the determined version prefix from branch name ($VERSION_PREFIX)."
#            exit 1
#          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Display .NET Version
        run: dotnet --version

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/Extensions.Reflection.csproj --configuration Release --no-build -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload nupkg artifact to github
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: src/bin/Release/*.nupkg

      - name: Publish preview version to MyGet
        run: dotnet nuget push src/bin/Release/*.nupkg --source https://www.myget.org/F/maestrianet/api/v3/index.json --api-key "${{ secrets.MYGET_API_KEY }}"

